<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Villa Joka – Verwaltung</title>
  <style>
    :root{--ink:#192830;--muted:#64747b;--teal:#1a6575;--teal2:#124d59;--sand:#f3eee4;--line:#ddd7ca;--white:#fff;--danger:#9d3f35;--ok:#24734d;--shadow:0 12px 36px rgba(25,40,48,.1)}
    *{box-sizing:border-box}body{margin:0;background:#f7f5f0;color:var(--ink);font:15px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .auth{min-height:100vh;display:grid;place-items:center;padding:24px}.auth-card{width:min(440px,100%);background:#fff;border:1px solid var(--line);border-radius:16px;padding:32px;box-shadow:var(--shadow)}.brand{color:var(--teal);font-family:Georgia,serif;font-size:1.75rem;margin:0}.lede{color:var(--muted);margin:6px 0 24px}.field{display:grid;gap:6px;margin-bottom:15px}.field label,.field-label{font-size:.82rem;font-weight:700;color:#405159}.field input,.field textarea,.field select{width:100%;border:1px solid #cfc8ba;border-radius:8px;background:#fff;padding:10px 11px;color:var(--ink)}.field textarea{min-height:92px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{outline:3px solid rgba(26,101,117,.14);border-color:var(--teal)}
    .primary,.secondary,.danger,.small{border:0;border-radius:8px;padding:11px 16px;font-weight:700}.primary{background:var(--teal);color:#fff}.primary:hover{background:var(--teal2)}.secondary{background:#e9eeef;color:var(--teal)}.danger{background:#f9e8e5;color:var(--danger)}.small{padding:7px 10px;background:#eef1f1;color:#405159;font-size:.82rem}.text-btn{border:0;background:none;color:var(--teal);padding:6px 0;text-decoration:underline}.error{color:var(--danger);font-weight:650}.success{color:var(--ok);font-weight:650}.notice{padding:10px 12px;border-radius:8px;background:#edf5f2;color:#275c49;margin:10px 0}.auth-actions{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .shell{min-height:100vh}.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}.top-inner{max-width:1400px;margin:auto;min-height:68px;padding:10px 20px;display:flex;align-items:center;gap:18px}.top-brand{font:700 1.3rem Georgia,serif;color:var(--teal);white-space:nowrap}.top-status{margin-left:auto;color:var(--muted);font-size:.86rem}.top-actions{display:flex;gap:8px;align-items:center}.layout{max-width:1400px;margin:auto;display:grid;grid-template-columns:230px minmax(0,1fr);gap:24px;padding:24px 20px 80px}.tabs{position:sticky;top:92px;align-self:start;display:grid;gap:5px}.tab{border:0;background:transparent;text-align:left;padding:10px 12px;border-radius:8px;color:#43545b;font-weight:650}.tab.active{background:var(--teal);color:#fff}.content-head{display:flex;align-items:start;justify-content:space-between;gap:18px;margin-bottom:18px}.content-head h1{font:600 clamp(1.7rem,3vw,2.3rem) Georgia,serif;margin:0;color:var(--teal)}.content-head p{margin:5px 0 0;color:var(--muted)}
    .panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 5px 22px rgba(25,40,48,.05);margin-bottom:16px}.panel h2{font:600 1.28rem Georgia,serif;color:var(--teal);margin:0 0 15px}.group{border:1px solid #e4ded2;border-radius:10px;padding:14px;margin:12px 0;background:#fff}.group-title{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-weight:800;color:#3b4e55}.group-title .item-actions{margin-left:auto}.language-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.lang-field{min-width:0}.lang-badge{display:inline-block;margin-bottom:5px;padding:2px 7px;border-radius:999px;background:#e9f0f1;color:var(--teal);font-size:.72rem;font-weight:800;text-transform:uppercase}.array-actions,.item-actions{display:flex;flex-wrap:wrap;gap:6px}.array-actions{margin-top:10px}.checkbox-row{display:flex;align-items:center;gap:9px}.checkbox-row input{width:18px;height:18px}.upload-row{display:flex;gap:8px;align-items:center;margin-top:8px}.upload-row input{min-width:0}.help{font-size:.8rem;color:var(--muted);margin-top:5px}.empty{padding:18px;text-align:center;color:var(--muted);border:1px dashed #cfc8ba;border-radius:9px}
    .versions{display:grid;gap:8px}.version{display:flex;align-items:center;gap:12px;padding:10px;border:1px solid #e4ded2;border-radius:9px}.version-main{min-width:0;flex:1}.version-title{font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.version-meta{font-size:.78rem;color:var(--muted)}
    .overlay{position:fixed;inset:0;z-index:100;background:rgba(247,245,240,.82);display:grid;place-items:center}.spinner{width:42px;height:42px;border:4px solid #cddadc;border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    .toast{position:fixed;right:18px;bottom:18px;z-index:90;max-width:min(430px,calc(100vw - 36px));padding:13px 16px;border-radius:10px;background:var(--ink);color:#fff;box-shadow:var(--shadow)}
    @media(max-width:850px){.layout{grid-template-columns:1fr}.tabs{position:static;display:flex;overflow:auto;padding-bottom:4px}.tab{white-space:nowrap}.language-grid{grid-template-columns:1fr}.top-status{display:none}.top-inner{flex-wrap:wrap}.top-actions{margin-left:auto}.content-head{display:block}}
    @media(max-width:520px){.top-inner{padding:10px 12px}.layout{padding:16px 12px 70px}.panel{padding:15px}.top-actions .secondary{display:none}.primary,.secondary{padding:9px 11px}.auth-card{padding:24px}}
  </style>
</head>
<body>
  <section id="auth" class="auth">
    <div class="auth-card">
      <h1 class="brand">Villa Joka</h1>
      <p class="lede">Inhalte einfach bearbeiten und veröffentlichen.</p>
      <form id="login-form">
        <div class="field"><label for="email">E-Mail-Adresse</label><input id="email" type="email" autocomplete="username" required></div>
        <div class="field"><label for="password">Passwort</label><input id="password" type="password" autocomplete="current-password" minlength="8" required></div>
        <div class="auth-actions"><button class="primary" type="submit">Anmelden</button><button class="text-btn" type="button" id="forgot">Passwort vergessen?</button></div>
      </form>
      <form id="password-form" class="hidden">
        <p id="password-intro" class="notice">Bitte legen Sie ein sicheres Passwort mit mindestens acht Zeichen fest.</p>
        <div class="field"><label for="new-password">Neues Passwort</label><input id="new-password" type="password" autocomplete="new-password" minlength="8" required></div>
        <button class="primary" type="submit">Passwort speichern</button>
      </form>
      <p id="auth-message" aria-live="polite"></p>
    </div>
  </section>

  <div id="app" class="shell hidden">
    <header class="topbar"><div class="top-inner">
      <div class="top-brand">Villa Joka Verwaltung</div>
      <div id="save-state" class="top-status">Alles gespeichert</div>
      <div class="top-actions"><a class="secondary" href="/" target="_blank" rel="noopener">Website ansehen</a><button id="save" class="primary" type="button">Speichern &amp; veröffentlichen</button><button id="logout" class="small" type="button">Abmelden</button></div>
    </div></header>
    <div class="layout">
      <nav id="tabs" class="tabs" aria-label="Inhaltsbereiche"></nav>
      <main>
        <div class="content-head"><div><h1 id="section-title">Inhalte</h1><p id="section-help"></p></div></div>
        <div id="editor"></div>
      </main>
    </div>
  </div>
  <div id="loading" class="overlay hidden"><div class="spinner" role="status" aria-label="Lädt"></div></div>
  <div id="toast" class="toast hidden" role="status"></div>
  <script type="module" src="/admin/admin.js"></script>
</body>
</html>
