<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Villa Joka Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

/* LOGIN */
#login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.login-box { background: #fff; border: 1px solid #e0d8cc; border-radius: 12px; padding: 2.5rem; max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.login-title { font-size: 1.4rem; font-weight: 700; color: #1A6575; margin-bottom: 0.25rem; }
.login-sub { color: #888; font-size: 0.88rem; margin-bottom: 2rem; }
.login-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 3px; }
.login-input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 10px 12px; font-size: 14px; outline: none; transition: border-color 0.2s; margin-bottom: 1.25rem; }
.login-input:focus { border-color: #1A6575; }
.login-btn { width: 100%; background: #1A6575; color: #fff; border: none; border-radius: 6px; padding: 11px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.login-btn:hover { background: #134e5c; }
.login-err { margin-top: 1rem; padding: 0.6rem 0.9rem; background: #fde8e8; color: #c0392b; border-radius: 6px; font-size: 13px; display: none; }

/* APP */
#app { display: none; min-height: 100vh; }

/* TOPBAR */
.topbar { background: #1A6575; color: #fff; padding: 0 1.5rem; height: 54px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.topbar-title { font-size: 1.05rem; font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: 0.6rem; }
.btn-save { background: #fff; color: #1A6575; border: none; border-radius: 6px; padding: 7px 18px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn-save:hover { background: #e8f4f5; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-logout { background: transparent; color: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.35); border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.btn-logout:hover { color: #fff; border-color: #fff; }

/* TABS */
.tabs-bar { background: #fff; border-bottom: 1px solid #e0d8cc; display: flex; padding: 0 1.5rem; overflow-x: auto; }
.tab-btn { background: transparent; border: none; border-bottom: 3px solid transparent; padding: 12px 16px; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; white-space: nowrap; transition: all 0.2s; margin-bottom: -1px; }
.tab-btn:hover { color: #1A6575; }
.tab-btn.active { color: #1A6575; border-bottom-color: #1A6575; font-weight: 700; }

/* CONTENT */
.tab-content { display: none; padding: 1.75rem 1.5rem; max-width: 1100px; margin: 0 auto; }
.tab-content.active { display: block; }

/* CARDS */
.card { background: #fff; border: 1px solid #e0d8cc; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 13px; font-weight: 700; color: #1A6575; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }

/* GRID */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
@media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } .grid-4 { grid-template-columns: repeat(2, 1fr); } }

/* FORM FIELDS */
.field { margin-bottom: 0.75rem; }
.field-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 3px; }
.field input, .field textarea, .field select {
  border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 100%; outline: none; transition: border-color 0.2s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: #1A6575; }
.field textarea { resize: vertical; min-height: 80px; }

/* LANG SWITCHER */
.lang-bar { display: flex; gap: 0.4rem; margin-bottom: 1rem; }
.lang-btn { background: #f5f5f0; border: 1px solid #e0d8cc; border-radius: 6px; padding: 5px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: #888; }
.lang-btn.active { background: #1A6575; color: #fff; border-color: #1A6575; }

/* BUTTONS */
.btn-add { background: transparent; border: 2px dashed #1A6575; color: #1A6575; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; }
.btn-add:hover { background: #e8f4f5; }
.btn-del { background: transparent; border: 1px solid #e0d8cc; color: #C26038; border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-del:hover { background: #fde8e0; border-color: #C26038; }

/* REVIEW CARD */
.review-card { background: #fff; border: 1px solid #e0d8cc; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; position: relative; }
.review-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
.review-meta { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 0.75rem; flex: 1; margin-right: 1rem; }
@media (max-width: 700px) { .review-meta { grid-template-columns: 1fr 1fr; } }

/* PRICE ROW */
.price-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; padding: 0.5rem 0.75rem; background: #fafaf8; border: 1px solid #e0d8cc; border-radius: 6px; }
.price-row.highlight { border-left: 3px solid #1A6575; }
.price-row .period-field { flex: 1; border: 1px solid #ddd; border-radius: 6px; padding: 5px 8px; font-size: 13px; outline: none; }
.price-row .period-field:focus { border-color: #1A6575; }
.price-row .price-field { width: 100px; border: 1px solid #ddd; border-radius: 6px; padding: 5px 8px; font-size: 13px; outline: none; }
.price-row .price-field:focus { border-color: #1A6575; }
.price-row label { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.price-row input[type=checkbox] { width: auto; }

/* GALLERY CELL */
.gallery-cell { background: #fff; border: 1px solid #e0d8cc; border-radius: 8px; padding: 0.75rem; }
.gallery-filename { font-size: 11px; color: #aaa; margin-bottom: 0.5rem; word-break: break-all; }
.gallery-cell input { border: 1px solid #ddd; border-radius: 6px; padding: 5px 8px; font-size: 12px; width: 100%; outline: none; margin-bottom: 0.35rem; }
.gallery-cell input:focus { border-color: #1A6575; }

/* NOTES TEXTAREA */
.notes-area { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-size: 13px; resize: vertical; min-height: 70px; outline: none; }
.notes-area:focus { border-color: #1A6575; }

/* TOAST */
#toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(120px); background: #192830; color: #fff; padding: 10px 22px; border-radius: 50px; font-size: 14px; font-weight: 500; z-index: 9999; transition: transform 0.35s; white-space: nowrap; pointer-events: none; }
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.success { background: #1A6575; }
#toast.error { background: #c0392b; }

/* SECTION HEADING */
.section-heading { font-size: 13px; font-weight: 700; color: #444; margin: 1.25rem 0 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
.section-heading:first-child { margin-top: 0; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-title">Villa Joka Admin</div>
    <div class="login-sub">GitHub Personal Access Token eingeben</div>
    <label class="login-label" for="pat-input">Personal Access Token</label>
    <input class="login-input" type="password" id="pat-input" placeholder="ghp_..." autocomplete="off">
    <button class="login-btn" id="login-btn">Verbinden</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">&#127968; Villa Joka Admin</div>
    <div class="topbar-right">
      <button class="btn-save" id="save-btn">Speichern</button>
      <button class="btn-logout" id="logout-btn">Abmelden</button>
    </div>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="kontakt">Kontakt</button>
    <button class="tab-btn" data-tab="texte">Texte</button>
    <button class="tab-btn" data-tab="bewertungen">Bewertungen</button>
    <button class="tab-btn" data-tab="galerie">Galerie</button>
    <button class="tab-btn" data-tab="villa">Villa</button>
    <button class="tab-btn" data-tab="apartment">Apartment</button>
  </div>

  <!-- TAB: KONTAKT -->
  <div class="tab-content active" id="tab-kontakt">
    <div class="card">
      <div class="card-title">Kontakt</div>
      <div class="grid-2">
        <div class="field"><label class="field-label">E-Mail</label><input type="email" id="c-email"></div>
        <div class="field"><label class="field-label">Telefon</label><input type="tel" id="c-phone"></div>
        <div class="field"><label class="field-label">WhatsApp</label><input type="tel" id="c-whatsapp"></div>
        <div class="field"><label class="field-label">Formspree ID</label><input type="text" id="c-formspree"></div>
      </div>
    </div>
  </div>

  <!-- TAB: TEXTE -->
  <div class="tab-content" id="tab-texte">
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="uk">UK</button>
    </div>
    <div class="card">
      <div class="card-title">Hero</div>
      <div class="field"><label class="field-label">Untertitel</label><textarea id="t-hero-sub" rows="3"></textarea></div>
    </div>
    <div class="card">
      <div class="card-title">About</div>
      <div class="field"><label class="field-label">Überschrift</label><input type="text" id="t-about-heading"></div>
      <div class="field"><label class="field-label">Text</label><textarea id="t-about-body" rows="6"></textarea></div>
    </div>
  </div>

  <!-- TAB: BEWERTUNGEN -->
  <div class="tab-content" id="tab-bewertungen">
    <div id="reviews-list"></div>
    <button class="btn-add" id="add-review-btn">+ Neue Bewertung</button>
  </div>

  <!-- TAB: GALERIE -->
  <div class="tab-content" id="tab-galerie">
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="uk">UK</button>
    </div>
    <div class="grid-4" id="gallery-grid"></div>
  </div>

  <!-- TAB: VILLA -->
  <div class="tab-content" id="tab-villa">
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="uk">UK</button>
    </div>
    <div class="card">
      <div class="card-title">Preise Villa</div>
      <div id="villa-prices"></div>
      <button class="btn-add" id="add-villa-btn">+ Zeile hinzufuegen</button>
    </div>
    <div class="card" style="margin-top:1rem;">
      <div class="card-title">Hinweistext Villa</div>
      <div class="lang-bar">
        <button class="lang-btn active" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="uk">UK</button>
      </div>
      <textarea class="notes-area" id="villa-notes"></textarea>
    </div>
  </div>

  <!-- TAB: APARTMENT -->
  <div class="tab-content" id="tab-apartment">
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="uk">UK</button>
    </div>
    <div class="card">
      <div class="card-title">Preise Apartment</div>
      <div id="apt-prices"></div>
      <button class="btn-add" id="add-apt-btn">+ Zeile hinzufuegen</button>
    </div>
    <div class="card" style="margin-top:1rem;">
      <div class="card-title">Hinweistext Apartment</div>
      <div class="lang-bar">
        <button class="lang-btn active" data-lang="de">DE</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="uk">UK</button>
      </div>
      <textarea class="notes-area" id="apt-notes"></textarea>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>
<script>
var REPO = 'stefanfersterer/villa-joka';
var FILE = 'content.json';
var API = 'https://api.github.com/repos/' + REPO + '/contents/' + FILE;

var data = {};
var fileSha = '';
var pat = '';

var textsLang = 'de';
var galleryLang = 'de';
var villaLang = 'de';
var aptLang = 'de';
var villaNotesLang = 'de';
var aptNotesLang = 'de';

/* INIT */
window.addEventListener('DOMContentLoaded', function() {
  pat = localStorage.getItem('vj_pat') || '';
  if (pat) {
    loadData();
  } else {
    document.getElementById('login').style.display = 'flex';
  }

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('pat-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('logout-btn').addEventListener('click', doLogout);
  document.getElementById('save-btn').addEventListener('click', saveData);
  document.getElementById('add-review-btn').addEventListener('click', addReview);
  document.getElementById('add-villa-btn').addEventListener('click', function() { addPriceRow('villa'); });
  document.getElementById('add-apt-btn').addEventListener('click', function() { addPriceRow('apt'); });

  var tabBtns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < tabBtns.length; i++) {
    tabBtns[i].addEventListener('click', function() {
      var tab = this.getAttribute('data-tab');
      switchTab(tab, this);
    });
  }

  var textsTab = document.getElementById('tab-texte');
  var textsLangBtns = textsTab.querySelectorAll('.lang-btn');
  for (var i = 0; i < textsLangBtns.length; i++) {
    textsLangBtns[i].addEventListener('click', function() {
      saveTextsToData();
      textsLang = this.getAttribute('data-lang');
      updateLangBtns(textsLangBtns, textsLang);
      loadTextsFromData();
    });
  }

  var galTab = document.getElementById('tab-galerie');
  var galLangBtns = galTab.querySelectorAll('.lang-btn');
  for (var i = 0; i < galLangBtns.length; i++) {
    galLangBtns[i].addEventListener('click', function() {
      saveGalleryToData();
      galleryLang = this.getAttribute('data-lang');
      updateLangBtns(galLangBtns, galleryLang);
      loadGalleryFromData();
    });
  }

  var villaTab = document.getElementById('tab-villa');
  var villaLangBtns = villaTab.querySelectorAll('.lang-bar:first-of-type .lang-btn');
  for (var i = 0; i < villaLangBtns.length; i++) {
    villaLangBtns[i].addEventListener('click', function() {
      savePricesToData('villa');
      villaLang = this.getAttribute('data-lang');
      updateLangBtns(villaLangBtns, villaLang);
      loadPricesFromData('villa');
    });
  }

  var villaNotesLangBtns = villaTab.querySelectorAll('.card:last-child .lang-btn');
  for (var i = 0; i < villaNotesLangBtns.length; i++) {
    villaNotesLangBtns[i].addEventListener('click', function() {
      saveNotesToData('villa');
      villaNotesLang = this.getAttribute('data-lang');
      updateLangBtns(villaNotesLangBtns, villaNotesLang);
      loadNotesFromData('villa');
    });
  }

  var aptTab = document.getElementById('tab-apartment');
  var aptLangBtns = aptTab.querySelectorAll('.lang-bar:first-of-type .lang-btn');
  for (var i = 0; i < aptLangBtns.length; i++) {
    aptLangBtns[i].addEventListener('click', function() {
      savePricesToData('apt');
      aptLang = this.getAttribute('data-lang');
      updateLangBtns(aptLangBtns, aptLang);
      loadPricesFromData('apt');
    });
  }

  var aptNotesLangBtns = aptTab.querySelectorAll('.card:last-child .lang-btn');
  for (var i = 0; i < aptNotesLangBtns.length; i++) {
    aptNotesLangBtns[i].addEventListener('click', function() {
      saveNotesToData('apt');
      aptNotesLang = this.getAttribute('data-lang');
      updateLangBtns(aptNotesLangBtns, aptNotesLang);
      loadNotesFromData('apt');
    });
  }
});

function doLogin() {
  var val = document.getElementById('pat-input').value.trim();
  if (!val) { showLoginErr('Bitte PAT eingeben.'); return; }
  pat = val;
  loadData();
}

function doLogout() {
  localStorage.removeItem('vj_pat');
  pat = '';
  data = {};
  fileSha = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('pat-input').value = '';
}

function showLoginErr(msg) {
  var el = document.getElementById('login-err');
  el.textContent = msg;
  el.style.display = 'block';
}

function switchTab(tab, btn) {
  var contents = document.querySelectorAll('.tab-content');
  for (var i = 0; i < contents.length; i++) contents[i].classList.remove('active');
  var tabBtns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < tabBtns.length; i++) tabBtns[i].classList.remove('active');
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}

function updateLangBtns(btns, lang) {
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-lang') === lang);
  }
}

function loadData() {
  fetch(API, {
    headers: { 'Authorization': 'token ' + pat, 'Accept': 'application/vnd.github.v3+json' }
  }).then(function(r) {
    if (r.status === 401) { showLoginErr('Ungultiger PAT.'); return null; }
    if (!r.ok) { showLoginErr('Fehler beim Laden: ' + r.status); return null; }
    return r.json();
  }).then(function(d) {
    if (!d) return;
    fileSha = d.sha;
    var bytes = new Uint8Array(atob(d.content.replace(/\n/g, '')).split('').map(function(c) { return c.charCodeAt(0); }));
    var text = new TextDecoder('utf-8').decode(bytes);
    data = JSON.parse(text);
    localStorage.setItem('vj_pat', pat);
    document.getElementById('login').style.display = 'none';
    document.getElementById('login-err').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderAll();
  }).catch(function(err) {
    showLoginErr('Verbindungsfehler: ' + err.message);
  });
}

function renderAll() {
  renderContact();
  loadTextsFromData();
  renderReviews();
  renderGallery();
  renderPrices('villa');
  renderPrices('apt');
  loadNotesFromData('villa');
  loadNotesFromData('apt');
}

function renderContact() {
  var c = data.contact || {};
  document.getElementById('c-email').value = c.email || '';
  document.getElementById('c-phone').value = c.phone || '';
  document.getElementById('c-whatsapp').value = c.whatsapp || '';
  document.getElementById('c-formspree').value = c.formspree_id || '';
}

function collectContact() {
  data.contact = {
    email: document.getElementById('c-email').value,
    phone: document.getElementById('c-phone').value,
    whatsapp: document.getElementById('c-whatsapp').value,
    formspree_id: document.getElementById('c-formspree').value
  };
}

function loadTextsFromData() {
  var h = data.hero || {};
  var a = data.about || {};
  var l = textsLang;
  document.getElementById('t-hero-sub').value = h['sub_' + l] || '';
  document.getElementById('t-about-heading').value = a['heading_' + l] || '';
  document.getElementById('t-about-body').value = a['body_' + l] || '';
}

function saveTextsToData() {
  var l = textsLang;
  if (!data.hero) data.hero = {};
  if (!data.about) data.about = {};
  data.hero['sub_' + l] = document.getElementById('t-hero-sub').value;
  data.about['heading_' + l] = document.getElementById('t-about-heading').value;
  data.about['body_' + l] = document.getElementById('t-about-body').value;
}

function renderReviews() {
  var list = document.getElementById('reviews-list');
  list.innerHTML = '';
  var reviews = data.reviews || [];
  for (var i = 0; i < reviews.length; i++) {
    list.appendChild(makeReviewCard(reviews[i], i));
  }
}

function makeReviewCard(r, idx) {
  var card = document.createElement('div');
  card.className = 'review-card';
  card.setAttribute('data-idx', idx);

  var starsOpts = '';
  for (var s = 1; s <= 5; s++) {
    starsOpts += '<option value="' + s + '"' + (r.stars === s ? ' selected' : '') + '>' + s + ' Sterne</option>';
  }

  card.innerHTML = '<div class="review-header">'
    + '<div class="review-meta">'
    + '<div class="field"><label class="field-label">Name</label><input type="text" class="rv-name" value="' + esc(r.name || '') + '"></div>'
    + '<div class="field"><label class="field-label">Herkunft</label><input type="text" class="rv-origin" value="' + esc(r.origin || '') + '"></div>'
    + '<div class="field"><label class="field-label">Platform</label><input type="text" class="rv-platform" value="' + esc(r.platform || '') + '"></div>'
    + '<div class="field"><label class="field-label">Sterne</label><select class="rv-stars">' + starsOpts + '</select></div>'
    + '</div>'
    + '<button class="btn-del" data-del="' + idx + '">&#x2715;</button>'
    + '</div>'
    + '<div class="lang-bar rv-lang-bar">'
    + '<button class="lang-btn active rv-lang" data-lang="de">DE</button>'
    + '<button class="lang-btn rv-lang" data-lang="en">EN</button>'
    + '<button class="lang-btn rv-lang" data-lang="uk">UK</button>'
    + '</div>'
    + '<div class="grid-2">'
    + '<div class="field"><label class="field-label">Datum</label><input type="text" class="rv-date" value="' + esc(r.date_de || '') + '"></div>'
    + '</div>'
    + '<div class="field"><label class="field-label">Text</label><textarea class="rv-text" rows="3">' + esc(r.text_de || '') + '</textarea></div>';

  var delBtn = card.querySelector('[data-del]');
  delBtn.addEventListener('click', function() {
    var i = parseInt(this.getAttribute('data-del'));
    collectAllReviews();
    data.reviews.splice(i, 1);
    renderReviews();
  });

  var langBtns = card.querySelectorAll('.rv-lang');
  var currentLang = 'de';

  function setReviewLang(lang) {
    saveReviewLang(card, idx, currentLang);
    currentLang = lang;
    for (var j = 0; j < langBtns.length; j++) {
      langBtns[j].classList.toggle('active', langBtns[j].getAttribute('data-lang') === lang);
    }
    var r2 = (data.reviews || [])[idx] || {};
    card.querySelector('.rv-date').value = r2['date_' + lang] || '';
    card.querySelector('.rv-text').value = r2['text_' + lang] || '';
  }

  for (var j = 0; j < langBtns.length; j++) {
    langBtns[j].addEventListener('click', function() {
      setReviewLang(this.getAttribute('data-lang'));
    });
  }

  return card;
}

function saveReviewLang(card, idx, lang) {
  if (!data.reviews) data.reviews = [];
  if (!data.reviews[idx]) data.reviews[idx] = {};
  data.reviews[idx]['date_' + lang] = card.querySelector('.rv-date').value;
  data.reviews[idx]['text_' + lang] = card.querySelector('.rv-text').value;
}

function collectAllReviews() {
  var cards = document.querySelectorAll('.review-card');
  for (var i = 0; i < cards.length; i++) {
    var card = cards[i];
    var idx = parseInt(card.getAttribute('data-idx'));
    if (!data.reviews) data.reviews = [];
    if (!data.reviews[idx]) data.reviews[idx] = {};
    data.reviews[idx].name = card.querySelector('.rv-name').value;
    data.reviews[idx].origin = card.querySelector('.rv-origin').value;
    data.reviews[idx].platform = card.querySelector('.rv-platform').value;
    data.reviews[idx].stars = parseInt(card.querySelector('.rv-stars').value);
    var activeLangBtn = card.querySelector('.rv-lang.active');
    var cl = activeLangBtn ? activeLangBtn.getAttribute('data-lang') : 'de';
    data.reviews[idx]['date_' + cl] = card.querySelector('.rv-date').value;
    data.reviews[idx]['text_' + cl] = card.querySelector('.rv-text').value;
  }
}

function addReview() {
  collectAllReviews();
  if (!data.reviews) data.reviews = [];
  data.reviews.push({ name: '', origin: '', stars: 5, platform: '', date_de: '', date_en: '', date_uk: '', text_de: '', text_en: '', text_uk: '' });
  renderReviews();
}

function renderGallery() {
  loadGalleryFromData();
}

function loadGalleryFromData() {
  var grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';
  var gallery = data.gallery || [];
  var l = galleryLang;
  for (var i = 0; i < gallery.length; i++) {
    var item = gallery[i];
    var cell = document.createElement('div');
    cell.className = 'gallery-cell';
    cell.setAttribute('data-idx', i);
    var src = item.src || '';
    var filename = src.split('/').pop() || src;
    var labelVal = item['label_' + l] || '';
    var altVal = item.alt_de || '';

    cell.innerHTML = '<div class="gallery-filename">' + esc(filename) + '</div>'
      + '<label class="field-label">Label</label>'
      + '<input type="text" class="gal-label" value="' + esc(labelVal) + '">'
      + (l === 'de' ? '<label class="field-label" style="margin-top:4px;">Alt-Text (DE)</label><input type="text" class="gal-alt" value="' + esc(altVal) + '">' : '');

    grid.appendChild(cell);
  }
}

function saveGalleryToData() {
  var cells = document.querySelectorAll('.gallery-cell');
  var l = galleryLang;
  for (var i = 0; i < cells.length; i++) {
    var cell = cells[i];
    var idx = parseInt(cell.getAttribute('data-idx'));
    if (!data.gallery) data.gallery = [];
    if (!data.gallery[idx]) data.gallery[idx] = {};
    var labelEl = cell.querySelector('.gal-label');
    if (labelEl) data.gallery[idx]['label_' + l] = labelEl.value;
    if (l === 'de') {
      var altEl = cell.querySelector('.gal-alt');
      if (altEl) data.gallery[idx].alt_de = altEl.value;
    }
  }
}

function renderPrices(type) {
  loadPricesFromData(type);
}

function loadPricesFromData(type) {
  var key = type === 'villa' ? 'prices_villa' : 'prices_apt';
  var containerId = type === 'villa' ? 'villa-prices' : 'apt-prices';
  var lang = type === 'villa' ? villaLang : aptLang;
  var container = document.getElementById(containerId);
  container.innerHTML = '';
  var prices = data[key] || [];
  for (var i = 0; i < prices.length; i++) {
    container.appendChild(makePriceRow(prices[i], i, type, lang));
  }
}

function makePriceRow(p, idx, type, lang) {
  var row = document.createElement('div');
  row.className = 'price-row' + (p.highlight ? ' highlight' : '');
  row.setAttribute('data-idx', idx);

  row.innerHTML = '<input type="text" class="period-field" value="' + esc(p['period_' + lang] || '') + '" placeholder="Zeitraum">'
    + '<input type="text" class="price-field" value="' + esc(p.price || '') + '" placeholder="Preis">'
    + '<label><input type="checkbox" class="hl-check"' + (p.highlight ? ' checked' : '') + '> Hochsaison</label>'
    + '<button class="btn-del" data-del="' + idx + '" data-type="' + type + '">&#x2715;</button>';

  var hlCheck = row.querySelector('.hl-check');
  hlCheck.addEventListener('change', function() {
    row.classList.toggle('highlight', this.checked);
  });

  var delBtn = row.querySelector('[data-del]');
  delBtn.addEventListener('click', function() {
    var i = parseInt(this.getAttribute('data-del'));
    var t = this.getAttribute('data-type');
    savePricesToData(t);
    var k = t === 'villa' ? 'prices_villa' : 'prices_apt';
    data[k].splice(i, 1);
    loadPricesFromData(t);
  });

  return row;
}

function savePricesToData(type) {
  var key = type === 'villa' ? 'prices_villa' : 'prices_apt';
  var containerId = type === 'villa' ? 'villa-prices' : 'apt-prices';
  var lang = type === 'villa' ? villaLang : aptLang;
  var rows = document.querySelectorAll('#' + containerId + ' .price-row');
  if (!data[key]) data[key] = [];
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var idx = parseInt(row.getAttribute('data-idx'));
    if (!data[key][idx]) data[key][idx] = {};
    data[key][idx]['period_' + lang] = row.querySelector('.period-field').value;
    data[key][idx].price = row.querySelector('.price-field').value;
    data[key][idx].highlight = row.querySelector('.hl-check').checked;
  }
}

function addPriceRow(type) {
  savePricesToData(type);
  var key = type === 'villa' ? 'prices_villa' : 'prices_apt';
  if (!data[key]) data[key] = [];
  data[key].push({ period_de: '', period_en: '', period_uk: '', price: '', highlight: false });
  loadPricesFromData(type);
}

function loadNotesFromData(type) {
  var key = type === 'villa' ? 'prices_villa_notes' : 'prices_apt_notes';
  var elId = type === 'villa' ? 'villa-notes' : 'apt-notes';
  var lang = type === 'villa' ? villaNotesLang : aptNotesLang;
  var notes = data[key] || {};
  document.getElementById(elId).value = notes[lang] || '';
}

function saveNotesToData(type) {
  var key = type === 'villa' ? 'prices_villa_notes' : 'prices_apt_notes';
  var elId = type === 'villa' ? 'villa-notes' : 'apt-notes';
  var lang = type === 'villa' ? villaNotesLang : aptNotesLang;
  if (!data[key]) data[key] = {};
  data[key][lang] = document.getElementById(elId).value;
}

function collectAll() {
  collectContact();
  saveTextsToData();
  collectAllReviews();
  saveGalleryToData();
  savePricesToData('villa');
  savePricesToData('apt');
  saveNotesToData('villa');
  saveNotesToData('apt');
}

function saveData() {
  collectAll();
  var btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Speichern...';

  var jsonStr = JSON.stringify(data, null, 2);
  var enc = new TextEncoder().encode(jsonStr);
  var bin = '';
  for (var i = 0; i < enc.length; i += 8192) {
    bin += String.fromCharCode.apply(null, enc.subarray(i, i + 8192));
  }
  var b64 = btoa(bin);

  fetch(API, {
    method: 'PUT',
    headers: { 'Authorization': 'token ' + pat, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
    body: JSON.stringify({ message: 'Admin: content.json aktualisiert', content: b64, sha: fileSha })
  }).then(function(r) {
    return r.json().then(function(d) { return { ok: r.ok, d: d }; });
  }).then(function(res) {
    btn.disabled = false;
    btn.textContent = 'Speichern';
    if (res.ok && res.d.commit) {
      fileSha = res.d.content.sha;
      showToast('Gespeichert!', 'success');
    } else {
      showToast('Fehler: ' + (res.d.message || 'Unbekannt'), 'error');
    }
  }).catch(function(err) {
    btn.disabled = false;
    btn.textContent = 'Speichern';
    showToast('Fehler: ' + err.message, 'error');
  });
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type || '';
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
