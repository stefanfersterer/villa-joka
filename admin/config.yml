backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: "de"

collections:
  - name: "settings"
    label: "Website-Inhalte"
    files:

      - name: "content"
        label: "Inhalte bearbeiten"
        file: "content.json"
        format: "json"
        fields:

          # ── KONTAKT ────────────────────────────────────────────────
          - label: "Kontakt & Links"
            name: "contact"
            widget: "object"
            collapsed: false
            fields:
              - label: "WhatsApp-Nummer (nur Ziffern, z.B. 436505428229)"
                name: "whatsapp"
                widget: "string"
                hint: "Keine Leerzeichen, kein + am Anfang"
              - label: "Formspree Form-ID"
                name: "formspree_id"
                widget: "string"
                hint: "Zu finden unter formspree.io → Euer Formular → Integration"
              - label: "E-Mail-Adresse"
                name: "email"
                widget: "string"
              - label: "Telefon (mit +, z.B. +436505428229)"
                name: "phone"
                widget: "string"

          # ── GALERIE ────────────────────────────────────────────────
          - label: "Galerie-Fotos"
            name: "gallery"
            widget: "list"
            label_singular: "Foto"
            hint: "Reihenfolge per Drag & Drop ändern. Bild hochladen = neues Foto zur Galerie hinzufügen."
            fields:
              - label: "Bild"
                name: "src"
                widget: "image"
                hint: "JPG oder PNG, empfohlen: 1200×800 px"
              - label: "Alt-Text (für Suchmaschinen & Barrierefreiheit)"
                name: "alt_de"
                widget: "string"
                hint: "Kurze Bildbeschreibung auf Deutsch"
              - label: "Bildunterschrift – Deutsch"
                name: "label_de"
                widget: "string"
              - label: "Bildunterschrift – Englisch"
                name: "label_en"
                widget: "string"
              - label: "Bildunterschrift – Ukrainisch"
                name: "label_uk"
                widget: "string"

          # ── PREISE VILLA ───────────────────────────────────────────
          - label: "Preise Villa – Gesamtes Haus"
            name: "prices_villa"
            widget: "list"
            label_singular: "Preiszeile"
            hint: "Jede Zeile = eine Saison. Reihenfolge per Drag & Drop."
            fields:
              - label: "Zeitraum (Deutsch)"
                name: "period_de"
                widget: "string"
                hint: "z.B. Juli & August"
              - label: "Zeitraum (Englisch)"
                name: "period_en"
                widget: "string"
              - label: "Zeitraum (Ukrainisch)"
                name: "period_uk"
                widget: "string"
              - label: "Preis pro Nacht"
                name: "price"
                widget: "string"
                hint: "z.B. € 520"
              - label: "Hochsaison hervorheben (fett & farbig)?"
                name: "highlight"
                widget: "boolean"
                default: false

          - label: "Hinweistext Preise Villa"
            name: "prices_villa_notes"
            widget: "object"
            collapsed: true
            hint: "Text unterhalb der Preistabelle (Reinigung, Kurtaxe etc.)"
            fields:
              - label: "Deutsch"
                name: "de"
                widget: "text"
              - label: "Englisch"
                name: "en"
                widget: "text"
              - label: "Ukrainisch"
                name: "uk"
                widget: "text"

          # ── PREISE EINLIEGERWOHNUNG ────────────────────────────────
          - label: "Preise Einliegerwohnung"
            name: "prices_apt"
            widget: "list"
            label_singular: "Preiszeile"
            fields:
              - label: "Zeitraum (Deutsch)"
                name: "period_de"
                widget: "string"
              - label: "Zeitraum (Englisch)"
                name: "period_en"
                widget: "string"
              - label: "Zeitraum (Ukrainisch)"
                name: "period_uk"
                widget: "string"
              - label: "Preis pro Nacht"
                name: "price"
                widget: "string"
              - label: "Hochsaison hervorheben?"
                name: "highlight"
                widget: "boolean"
                default: false

          - label: "Hinweistext Preise Einliegerwohnung"
            name: "prices_apt_notes"
            widget: "object"
            collapsed: true
            fields:
              - label: "Deutsch"
                name: "de"
                widget: "text"
              - label: "Englisch"
                name: "en"
                widget: "text"
              - label: "Ukrainisch"
                name: "uk"
                widget: "text"
